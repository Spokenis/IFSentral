<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IFSentral | Registro</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/icheck-bootstrap/3.0.1/icheck-bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
  <style>
    :root {
      --ifsc-primary: #1B7D3D;
      --ifsc-secondary: #0D4620;
      --ifsc-light: #2A9B4A;
    }
    
    /* Estilo para a mensagem de status */
    #register-status-msg {
      margin-top: 15px;
      font-size: 0.9em;
    }
    
    /* IFSC Theme Colors */
    .btn-primary, .btn-primary:hover, .btn-primary:focus, .btn-primary:active {
      background-color: var(--ifsc-primary) !important;
      border-color: var(--ifsc-primary) !important;
    }
    .btn-primary:hover {
      background-color: var(--ifsc-secondary) !important;
    }
    
    .card-primary .card-header {
      background-color: var(--ifsc-primary) !important;
    }
    
    .card-primary {
      border-top-color: var(--ifsc-primary) !important;
    }
    
    .icheck-primary input:checked ~ label::before {
      background-color: var(--ifsc-primary) !important;
      border-color: var(--ifsc-primary) !important;
    }
  </style>
</head>
<body class="hold-transition register-page">
<div class="register-box">
  <div class="register-logo">
    <a href="../pages/index.html"><b>IF</b>Sentral</a>
  </div>

  <div class="card card-outline card-primary">
    <div class="card-body">
      <p class="login-box-msg">Criar uma nova conta</p>

      <form id="register-form">
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Nome completo" id="user-name" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="email" class="form-control" placeholder="Email" id="user-email" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>
        
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Nome de Usuário (login)" id="user-username" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-at"></span>
            </div>
          </div>
        </div>
        
        <div class="input-group mb-3">
          <input type="password" class="form-control" placeholder="Senha" id="user-password" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control" placeholder="Repita a senha" id="user-password-confirm" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
              <input type="checkbox" id="agreeTerms" name="terms" value="agree" required>
              <label for="agreeTerms">
               Eu concordo com os <a href="#">termos</a>
              </label>
            </div>
          </div>
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block" id="register-button">Registrar</button>
          </div>
        </div>
        
        <div id="register-status-msg"></div>
        
      </form>

      <a href="login.html" class="text-center">Eu já tenho uma conta</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>

<script>
    const registerForm = document.getElementById('register-form');
    const statusMsg = document.getElementById('register-status-msg');
    const registerButton = document.getElementById('register-button');
    const API_URL = 'cadastrar_usuario.php';

    registerForm.addEventListener('submit', async function(event) {
        event.preventDefault(); // Impede o envio tradicional
        
        statusMsg.innerHTML = 'Registrando...';
        statusMsg.style.color = 'black';
        registerButton.disabled = true;

        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const username = document.getElementById('user-username').value;
        const password = document.getElementById('user-password').value;
        const passwordConfirm = document.getElementById('user-password-confirm').value;

        // --- Validação no lado do cliente ---
        if (password !== passwordConfirm) {
            statusMsg.innerHTML = `<span style="color: red;">As senhas não conferem.</span>`;
            registerButton.disabled = false;
            return; // Para a execução
        }
        
        if (password.length < 6) { // Exemplo de outra validação
            statusMsg.innerHTML = `<span style="color: red;">A senha deve ter pelo menos 6 caracteres.</span>`;
            registerButton.disabled = false;
            return;
        }
        // --- Fim da Validação ---

        const data = {
            name: name,
            email: email,
            username: username,
            password: password,
            profile: 'User' // Perfil padrão
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const resultado = await response.json();

            if (!response.ok) {
                // Se a API retornar um erro (ex: 400, 500)
                // A sua API retorna 'Erro: Email ou Nome de Usuário já existem.'
                throw new Error(resultado.error || 'Erro desconhecido');
            }

            // Sucesso!
            statusMsg.innerHTML = `<span style="color: green;">${resultado.message} Redirecionando para o login...</span>`;
            registerForm.reset();
            
            // Redireciona para o login após 2 segundos
            setTimeout(() => {
                window.location.href = '../auth/login.html';
            }, 2000);

        } catch (error) {
            // Exibe o erro da API (ex: "Email já existe")
            statusMsg.innerHTML = `<span style="color: red;">${error.message}</span>`;
            registerButton.disabled = false;
        }
    });
</script>
</body>
</html>
